<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>무한슈팅 살아남기!</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        /* 메인 메뉴 비율 보정용 추가 CSS */
        #main-menu .menu-content {
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="bgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>
    
    <div id="warning-banner">
        <h2 id="warning-text" class="cartoon-text" style="margin:0; font-size: clamp(1.5rem, 6vw, 2.5rem); color: #ff4757; word-break: keep-all; padding: 0 15px; text-align: center;">경고 문구</h2>
        <div id="warning-sub" class="cartoon-text" style="font-size: clamp(0.9rem, 3.5vw, 1.2rem); margin-top: 5px; padding: 0 15px; word-break: keep-all; text-align: center;">준비하세요!</div>
    </div>

    <div id="toast-msg" class="cartoon-text" style="position:absolute; top:130px; left:50%; transform:translateX(-50%); opacity:0; color:#fff; background:#000; border: 4px solid #fff; padding:10px 30px; border-radius:15px; z-index:90; font-size:1.2rem; transition:0.2s;"></div>

    <div id="hud">
        <div id="exp-container"><div id="exp-bar"></div></div>
        <div id="stats-row" style="position: absolute; top: 22px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; box-sizing: border-box; align-items: flex-start; z-index: 41; pointer-events: none;">
            <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 4px;">
                <div id="level-display" class="hud-box" style="margin: 0;">LV. 1</div>
                <div style="display: flex; align-items: center; gap: 4px; margin-top: 2px;">
                    <span class="heart-icon" style="font-size: 1rem; text-shadow: 2px 2px 0 #000; line-height: 1;">❤️</span>
                    <div id="hp-container" style="margin: 0; width: 85px; height: 12px; background: #fff; border: 3px solid #000; border-radius: 6px; overflow: hidden; box-shadow: 2px 2px 0 #000;">
                        <div id="hp-bar" style="width: 100%; height: 100%; background: var(--hp-color); transition: 0.2s;"></div>
                    </div>
                </div>
            </div>
            <div class="cartoon-text" id="timer" style="line-height: 1; margin: 0; padding-top: 2px;">00:00</div>
            <div style="display: flex; flex-direction: column; gap: 4px; align-items: flex-end;">
                <div id="kill-count" class="hud-box" style="margin: 0;">💀 0</div>
                <div id="gold-display" class="hud-box" style="margin: 0; background: #fffde7; border-color: #f1c40f;">🪙 0</div>
            </div>
        </div>
    </div>

    <div id="inventory-wrapper" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 45;">
        <div style="position: absolute; bottom: 30px; left: 20px; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; pointer-events: auto;">
            <div id="inventory-container">
                <div class="inv-row" id="evolved-inv-row"></div>
                <div class="inv-row" id="weapon-inv-row"></div>
                <div class="inv-row" id="acc-inv-row"></div>
            </div>
            <button id="inv-toggle-btn" onclick="toggleInventory()" style="width: auto; padding: 4px 12px; font-size: 0.9rem; margin: 0; background: #fff; border: 2px solid #000; border-radius: 8px; box-shadow: 2px 2px 0 #000; color: #000; font-family: 'Black Han Sans';">▼ 가방 닫기</button>
        </div>
        <button onclick="openInGameShop()" style="pointer-events: auto; position: absolute; bottom: 30px; right: 20px; width: auto; padding: 12px 20px; font-size: 1.2rem; margin: 0; background: #ffeaa7; border: 3px solid #000; border-radius: 10px; box-shadow: 3px 3px 0 #000; color: #d63031; font-weight: bold; font-family: 'Black Han Sans';">🛒 상점</button>
    </div>

    <div id="joystick-area"><div id="joystick-stick"></div></div>

    <div id="loading-screen" class="overlay">
        <h2 class="cartoon-text" style="font-size: 3.5rem; color: var(--accent);">살아남기 준비중!</h2>
        <div style="width: 250px; height: 25px; background: #fff; border: 4px solid #000; border-radius: 15px; margin-top: 20px; overflow: hidden; box-shadow: 4px 4px 0 #000;">
            <div class="loader-bar" style="width: 0%; height: 100%; background: #ff4757;"></div>
        </div>
    </div>

    <div id="main-menu" class="overlay hidden" style="background: var(--primary-bg); display: flex; align-items: center; justify-content: center;">
        <canvas id="menu-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;"></canvas>
        <div class="menu-content">
            <h1 class="cartoon-text" style="font-size: clamp(2.5rem, 10vw, 5rem); color: var(--accent); margin-bottom: 30px; line-height: 1.1; text-align: center;">무한슈팅<br>살아남기!</h1>
            <div style="display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 320px;">
                <button id="continue-btn" onclick="startGame(true)" style="display:none; background:#ff9f43;">이어하기</button>
                <button onclick="showOverlay('difficulty-screen')">새 게임 시작</button>
                <button onclick="showOverlay('how-to-play')">게임 방법</button>
                <button onclick="showOverlay('options-screen')">설정</button>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="overlay hidden" style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85);">
        <h2 id="end-title" class="cartoon-text" style="font-size: clamp(3.5rem, 15vw, 5.5rem); color: #ff4757; margin: 0;">전투 불능</h2>
        <p id="result-stats" class="cartoon-text" style="font-size: 1.5rem; color: #fff; margin: 20px 0 40px;"></p>
        <button onclick="returnToMenu()" style="width: 80%; max-width: 300px; margin: 0;">메인 메뉴로</button>
    </div>

    <div id="difficulty-screen" class="overlay hidden" style="display: flex; align-items: center; justify-content: center;">
        <div class="cartoon-panel modal-body">
            <h2 class="cartoon-text" style="font-size: 2.2rem; color: var(--accent); margin:0;">난이도 선택</h2>
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                <button onclick="startGame(false, 'EASY')" style="width:100%; margin:0; background:#2ed573;">EASY</button>
                <button onclick="startGame(false, 'NORMAL')" style="width:100%; margin:0; background:#ffa502;">NORMAL</button>
                <button onclick="startGame(false, 'HARD')" style="width:100%; margin:0; background:#ff4757; color:#fff;">HARD</button>
            </div>
            <button onclick="showOverlay('main-menu')" style="width:100%; margin-top: 15px; background:#ccc;">뒤로 가기</button>
        </div>
    </div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
