<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>무한슈팅 살아남기!</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="game-container">
    <canvas id="bgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>
    
    <div id="warning-banner">
        <h2 id="warning-text" class="cartoon-text" style="margin:0; font-size: clamp(1.5rem, 6vw, 2.5rem); color: #ff4757; word-break: keep-all; padding: 0 15px; text-align: center;">경고 문구</h2>
        <div id="warning-sub" class="cartoon-text" style="font-size: clamp(0.9rem, 3.5vw, 1.2rem); margin-top: 5px; padding: 0 15px; word-break: keep-all; text-align: center;">준비하세요!</div>
    </div>

    <div id="toast-msg" class="cartoon-text" style="position:absolute; top:130px; left:50%; transform:translateX(-50%); opacity:0; color:#fff; background:#000; border: 4px solid #fff; padding:10px 30px; border-radius:15px; z-index:90; font-size:1.2rem; transition:0.2s;"></div>

    <div id="hud">
        <div id="exp-container"><div id="exp-bar"></div></div>
        
        <div id="stats-row" style="position: absolute; top: 22px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; box-sizing: border-box; align-items: flex-start; z-index: 41; pointer-events: none;">
            <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 4px;">
                <!-- 능력치 버튼을 레벨 디스플레이 옆으로 이동 -->
                <div style="display: flex; align-items: center; gap: 6px; pointer-events: auto;">
                    <div id="level-display" class="hud-box" style="margin: 0;">LV. 1</div>
                    <button onclick="toggleStatus()" class="hud-box" style="margin: 0; background: #74b9ff; color: #fff; cursor: pointer; padding: 4px 10px; width: auto; font-size: 1.1rem; height: auto; box-shadow: 2px 2px 0 #000;">📊 능력치</button>
                </div>
                <div style="display: flex; align-items: center; gap: 4px; margin-top: 2px;">
                    <span class="heart-icon" style="font-size: 1rem; text-shadow: 2px 2px 0 #000; line-height: 1;">❤️</span>
                    <div id="hp-container" style="margin: 0; width: 85px; height: 12px; background: #fff; border: 3px solid #000; border-radius: 6px; overflow: hidden; box-shadow: 2px 2px 0 #000;">
                        <div id="hp-bar" style="width: 100%; height: 100%; background: var(--hp-color); transition: 0.2s;"></div>
                    </div>
                </div>
            </div>
            <div class="cartoon-text" id="timer" style="line-height: 1; margin: 0; padding-top: 2px;">00:00</div>
            <div style="display: flex; flex-direction: column; gap: 4px; align-items: flex-end;">
                <div id="kill-count" class="hud-box" style="margin: 0;">💀 0</div>
                <div id="gold-display" class="hud-box" style="margin: 0; background: #fffde7; border-color: #f1c40f;">🪙 0</div>
            </div>
        </div>
    </div>

    <!-- 무기 인벤토리 (좌측 하단 배치)[cite: 10, 14] -->
    <div id="inventory-wrapper" style="position: absolute; bottom: max(15px, env(safe-area-inset-bottom)); left: 15px; display: flex; flex-direction: column; align-items: flex-start; z-index: 50; pointer-events: auto;">
        <div id="inventory-container">
            <div class="inv-row" id="evolved-inv-row"></div>
            <div class="inv-row" id="weapon-inv-row"></div>
            <div class="inv-row" id="acc-inv-row"></div>
        </div>
        <button id="inv-toggle-btn" onclick="toggleInventory()" style="width: auto; padding: 4px 12px; font-size: 0.9rem; margin: 4px 0 0 0; background: #fff; border: 2px solid #000; border-radius: 8px; box-shadow: 2px 2px 0 #000; color: #000; font-family: 'Black Han Sans';">▼ 가방 닫기</button>
    </div>

    <!-- 상점 버튼 (우측 하단 정사각형 배치)[cite: 10, 14] -->
    <div id="shop-wrapper" style="position: absolute; bottom: max(15px, env(safe-area-inset-bottom)); right: 15px; z-index: 50; pointer-events: auto;">
        <button onclick="openInGameShop()" class="square-shop-btn">🛒</button>
    </div>

    <div id="joystick-area"><div id="joystick-stick"></div></div>

    <div id="loading-screen" class="overlay">
        <h2 class="cartoon-text" style="font-size: 3.5rem; color: var(--accent);">살아남기 준비중!</h2>
        <div style="width: 250px; height: 25px; background: #fff; border: 4px solid #000; border-radius: 15px; margin-top: 20px; overflow: hidden; box-shadow: 4px 4px 0 #000;">
            <div class="loader-bar" style="width: 0%; height: 100%; background: #ff4757;"></div>
        </div>
    </div>

    <div id="main-menu" class="overlay hidden" style="background: var(--primary-bg);">
        <canvas id="menu-canvas"></canvas>
        <div style="z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; margin-top: -50px;">
            <h1 class="cartoon-text" style="font-size: 4.5rem; color: var(--accent); margin-bottom: 40px; line-height: 1.1;">무한슈팅<br>살아남기!</h1>
            
            <button id="continue-btn" onclick="startGame(true)" style="display:none; background:#ff9f43; margin-bottom: 15px;">이어하기</button>
            <button onclick="showOverlay('difficulty-screen')">새 게임 시작</button>
            <button onclick="showOverlay('how-to-play')">게임 방법</button>
            <button onclick="showOverlay('options-screen')">설정</button>
        </div>
    </div>

    <div id="difficulty-screen" class="overlay hidden">
        <div class="cartoon-panel modal-body">
            <h2 class="cartoon-text" style="font-size: 2.5rem; color: var(--accent); margin-top:0;">난이도 선택</h2>
            <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
                <button onclick="startGame(false, 'EASY')" style="width:100%; margin:0; background:#2ed573;">EASY</button>
                <button onclick="startGame(false, 'NORMAL')" style="width:100%; margin:0; background:#ffa502;">NORMAL</button>
                <button onclick="startGame(false, 'HARD')" style="width:100%; margin:0; background:#ff4757; color:#fff;">HARD</button>
            </div>
            <button onclick="showOverlay('main-menu')" style="width:100%; margin: 20px 0 0 0; box-sizing: border-box; background:#ccc;">뒤로 가기</button>
        </div>
    </div>

    <div id="in-game-shop-screen" class="overlay hidden" style="z-index: 200;">
        <div class="cartoon-panel modal-body" style="max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; padding: 15px;">
            <h2 class="cartoon-text" style="font-size: 2.2rem; color: #00d2ff; margin-top:0; margin-bottom: 10px;">인게임 상점</h2>
            <div class="cartoon-text" id="shop-gold-display" style="font-size: 1.5rem; color: #f1c40f; margin-bottom: 15px;">보유 금화: 🪙 0</div>
            <div id="shop-list-container" style="flex-grow: 1; overflow-y: auto;"></div>
            <button onclick="closeInGameShop()" style="width:100%; margin: 15px 0 0 0; box-sizing: border-box; background: #ff4757; color: #fff;">닫기</button>
        </div>
    </div>

    <div id="status-screen" class="overlay hidden" style="z-index: 250;">
        <div class="cartoon-panel modal-body" style="background: #f1f2f6; line-height: 1.25;">
            <h2 class="cartoon-text" style="font-size: 2.2rem; color: #2c3e50; margin-top:0; margin-bottom: 10px;">캐릭터 능력치</h2>
            <div id="status-content" class="stat-grid" style="margin-top: 15px; grid-template-columns: 1fr;"></div>
            <button onclick="toggleStatus()" style="width: 100%; margin-top: 15px; background: #ff4757; color: #fff;">닫기</button>
        </div>
    </div>

    <div id="how-to-play" class="overlay hidden">
        <div class="cartoon-panel modal-body">
            <h2 class="cartoon-text" style="font-size: 2.5rem; color: var(--accent); margin-top:0;">플레이 가이드</h2>
            <div style="text-align: left; font-family: 'Pretendard', sans-serif; font-weight: bold; font-size: 1rem; color: #fff; line-height: 1.8;">
                <p>🎮 이동: 화면 드래그</p>
                <p>⚔️ 공격: 자동 공격</p>
                <p>🔥 진화: 무기 LV.5 + 보조 LV.4</p>
            </div>
            <button onclick="showOverlay('main-menu')" style="width:100%; margin: 20px 0 0 0; box-sizing: border-box;">확인</button>
        </div>
    </div>

    <div id="options-screen" class="overlay hidden">
        <div class="cartoon-panel modal-body">
            <h2 class="cartoon-text" style="font-size: 2.5rem; color: var(--accent); margin-top:0;">게임 설정</h2>
            <div class="option-group">
                <span class="cartoon-text" style="font-size: 1.2rem;">BGM</span>
                <div id="bgm-toggle" class="toggle-btn on" onclick="toggleAudio('bgm')">ON</div>
            </div>
            <div class="option-group">
                <span class="cartoon-text" style="font-size: 1.2rem;">SFX</span>
                <div id="sfx-toggle" class="toggle-btn on" onclick="toggleAudio('sfx')">ON</div>
            </div>
            <button onclick="saveOptionsAndBack()" style="width:100%; margin: 20px 0 0 0; box-sizing: border-box;">저장</button>
        </div>
    </div>

    <div id="level-up-screen" class="overlay hidden">
        <div class="cartoon-panel modal-body" style="max-height: 90vh; overflow-y: auto;">
            <h2 id="level-up-title" class="cartoon-text">LEVEL UP!</h2>
            <div id="choice-container" class="card-container"></div>
            <div id="item-detail-panel" class="hidden">
                <div id="detail-stats-box" class="stat-grid"></div>
                <div id="detail-perk" class="perk-box hidden"></div>
                <div id="detail-combo"></div>
            </div>
            <button id="confirm-select-btn" onclick="confirmSelection()" style="width: 100%; margin: 15px 0 0 0; background: #2ed573;" disabled>선택 완료</button>
        </div>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <h2 id="end-title" class="cartoon-text" style="font-size: 4.5rem; color: var(--hp-color); margin-bottom: 10px;">전투 불능</h2>
        <p id="result-stats" class="cartoon-text" style="font-size: 1.5rem; margin-bottom: 40px;"></p>
        <button onclick="returnToMenu()" style="width: 100%; margin: 0;">메인 메뉴로</button>
    </div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
